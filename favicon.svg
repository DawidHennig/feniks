<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Black background -->
  <rect width="192" height="192" fill="#0a0a0a" rx="40"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="phoenixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#dc2626;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- FENIKS BODY - Main structure -->
  <!-- Curved body shape (like in logo) -->
  <path d="M 96 50 
           C 75 55, 65 75, 68 95
           C 70 110, 80 125, 96 128
           C 112 125, 122 110, 124 95
           C 127 75, 117 55, 96 50 Z" 
        fill="url(#phoenixGrad)" stroke="#8b1818" stroke-width="1"/>
  
  <!-- FENIKS HEAD - Round with details -->
  <circle cx="96" cy="60" r="18" fill="url(#phoenixGrad)" stroke="#8b1818" stroke-width="1"/>
  
  <!-- Head accent (lighter) -->
  <circle cx="96" cy="58" r="12" fill="#ff4444" opacity="0.6"/>
  
  <!-- CREST - Feathers on top of head -->
  <path d="M 88 42 L 84 28 M 96 40 L 96 22 M 104 42 L 108 28" 
        stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="96" cy="22" r="2" fill="#fbbf24"/>
  
  <!-- BEAK -->
  <path d="M 108 60 L 135 55 L 110 65 Z" fill="#fbbf24" stroke="#f97316" stroke-width="0.5"/>
  
  <!-- EYE -->
  <circle cx="107" cy="57" r="2.5" fill="#fbbf24"/>
  <circle cx="108" cy="56" r="1" fill="#0a0a0a" opacity="0.5"/>
  
  <!-- LEFT WING - Large curved -->
  <path d="M 70 75 
           Q 35 65, 28 95
           Q 32 85, 50 85
           Q 65 85, 75 95
           Q 72 85, 70 75 Z" 
        fill="url(#phoenixGrad)" opacity="0.95" stroke="#8b1818" stroke-width="1"/>
  
  <!-- Left wing feathers -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 45 75 L 35 78"/>
    <path d="M 48 80 L 36 85"/>
    <path d="M 52 85 L 40 92"/>
    <path d="M 58 88 L 48 96"/>
  </g>
  
  <!-- RIGHT WING - Large curved -->
  <path d="M 122 75 
           Q 157 65, 164 95
           Q 160 85, 142 85
           Q 127 85, 117 95
           Q 120 85, 122 75 Z" 
        fill="url(#phoenixGrad)" opacity="0.95" stroke="#8b1818" stroke-width="1"/>
  
  <!-- Right wing feathers -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 147 75 L 157 78"/>
    <path d="M 144 80 L 156 85"/>
    <path d="M 140 85 L 152 92"/>
    <path d="M 134 88 L 144 96"/>
  </g>
  
  <!-- TAIL FEATHERS - Curved upward -->
  <path d="M 82 120 Q 75 135, 70 155" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 96 122 Q 96 140, 96 160" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 120 Q 117 135, 122 155" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Tail highlight -->
  <path d="M 96 122 Q 100 140, 102 160" stroke="#f97316" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- FIRE/FLAMES around phoenix -->
  <!-- Left flame -->
  <path d="M 25 100 Q 15 85, 25 70 Q 35 80, 40 100 Q 35 110, 25 100 Z" fill="url(#fireGrad)" opacity="0.7"/>
  
  <!-- Right flame -->
  <path d="M 167 100 Q 177 85, 167 70 Q 157 80, 152 100 Q 157 110, 167 100 Z" fill="url(#fireGrad)" opacity="0.7"/>
  
  <!-- Bottom left flame -->
  <path d="M 60 130 Q 45 125, 50 145 Q 60 140, 70 135 Q 65 132, 60 130 Z" fill="url(#fireGrad)" opacity="0.6"/>
  
  <!-- Bottom right flame -->
  <path d="M 132 130 Q 147 125, 142 145 Q 132 140, 122 135 Q 127 132, 132 130 Z" fill="url(#fireGrad)" opacity="0.6"/>
  
  <!-- Fire aura -->
  <circle cx="96" cy="95" r="58" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3"/>
  <circle cx="96" cy="95" r="62" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Decorative elements - small fire sparks -->
  <circle cx="50" cy="60" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="145" cy="65" r="1.5" fill="#f97316" opacity="0.5"/>
  <circle cx="45" cy="105" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="150" cy="110" r="1" fill="#f97316" opacity="0.5"/>
</svg>